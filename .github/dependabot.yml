# Dependabot configuration.
# Covers the ecosystems with a supported package manager:
#   - Gradle (Android companion, incl. the libs.versions.toml catalog)
#   - GitHub Actions (CI workflows)
# The iOS companion vendors the Connect IQ SDK as a framework (no package
# manager) and the Garmin watch app is Monkey C, so neither is managed here.
version: 2
updates:
  # --- Android companion (Gradle) ---
  - package-ecosystem: "gradle"
    directory: "/companion"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "android"
    commit-message:
      prefix: "build(deps)"
    # androidx.core 1.19.0+ requires compileSdk 37 (Android 17, preview) — too new
    # for a Play-published app. Hold it back until we deliberately move to SDK 37;
    # without this the whole gradle-minor-patch group PR fails the Android build.
    ignore:
      - dependency-name: "androidx.core:core"
        versions: [">=1.19.0"]
      - dependency-name: "androidx.core:core-ktx"
        versions: [">=1.19.0"]
    # Roll routine minor/patch bumps into a single PR to cut review noise;
    # major bumps stay as their own PRs so breaking changes get attention.
    groups:
      gradle-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # --- GitHub Actions (CI workflows) ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci(deps)"
    groups:
      actions-all:
        update-types:
          - "minor"
          - "patch"

name: Deploy Privacy Policy (Pages)

on:
  push:
    branches: [ "main" ]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Permissions the GitHub Pages deploy action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one Pages deploy at a time; don't cancel an in-progress one.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

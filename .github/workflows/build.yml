name: SentryKey Build CI

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-garmin:
    name: Build Garmin Watch App
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/blackshadev/garmin-connectiq-tools:9.1.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Decode Developer Key
        run: |
          if [ -z "${{ secrets.GARMIN_DEVELOPER_KEY }}" ]; then
            echo "Error: GARMIN_DEVELOPER_KEY secret is not set!" >&2
            exit 1
          fi
          echo "${{ secrets.GARMIN_DEVELOPER_KEY }}" | base64 -d > developer_key.der

      - name: Compile Garmin App
        run: |
          mkdir -p bin
          
          echo "Compiling Garmin Store Package (.iq)..."
          java -jar /connectiq/bin/monkeybrains.jar \
            -e \
            -f monkey.jungle \
            -y developer_key.der \
            -o bin/SentryKey.iq
          
          echo "Compiling Garmin Watch Binaries (.prg)..."
          java -jar /connectiq/bin/monkeybrains.jar \
            -f monkey.jungle \
            -y developer_key.der \
            -o bin/SentryKey_fenix843mm.prg \
            -d fenix843mm
          
          java -jar /connectiq/bin/monkeybrains.jar \
            -f monkey.jungle \
            -y developer_key.der \
            -o bin/SentryKey_fenix847mm.prg \
            -d fenix847mm
          
          java -jar /connectiq/bin/monkeybrains.jar \
            -f monkey.jungle \
            -y developer_key.der \
            -o bin/SentryKey_fenix8solar47mm.prg \
            -d fenix8solar47mm
          
          java -jar /connectiq/bin/monkeybrains.jar \
            -f monkey.jungle \
            -y developer_key.der \
            -o bin/SentryKey_fenix8solar51mm.prg \
            -d fenix8solar51mm

      - name: Upload Garmin Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sentrykey-garmin-build
          path: bin/

  build-android:
    name: Build Android Companion App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Build Android App
        run: |
          cd companion
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK file
        run: |
          mv companion/app/build/outputs/apk/debug/app-debug.apk companion/app/build/outputs/apk/debug/SentryKey.apk

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: sentrykey-companion-apk
          path: companion/app/build/outputs/apk/debug/SentryKey.apk

  build-ios:
    name: Compile iOS Companion
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # The loose .swift sources can't be built alone — xcodebuild needs a
      # committed Xcode project. ConnectIQ.framework is a licensed Garmin binary
      # that is NOT committed, so CI must fetch it at build time (e.g. a download
      # step using a private URL secret) before the build step will link.
      # Until the project exists this job skips with a notice instead of failing.
      - name: Check for Xcode project
        id: check
        run: |
          if [ -d companion-ios/SentryKey.xcodeproj ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No companion-ios/SentryKey.xcodeproj yet — skipping iOS compile-check. Create it in Xcode to enable this job. Note: ConnectIQ.framework is gitignored (licensed); CI must fetch it before building."
          fi

      - name: Select latest Xcode
        if: steps.check.outputs.exists == 'true'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build (no code signing)
        if: steps.check.outputs.exists == 'true'
        run: |
          xcodebuild build \
            -project companion-ios/SentryKey.xcodeproj \
            -scheme SentryKey \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

  create-release:
    name: Publish GitHub Release
    needs: [build-garmin, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Garmin Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: sentrykey-garmin-build
          path: garmin-build/

      - name: Download Android Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: sentrykey-companion-apk
          path: android-build/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            garmin-build/SentryKey.iq
            garmin-build/SentryKey_fenix843mm.prg
            garmin-build/SentryKey_fenix847mm.prg
            garmin-build/SentryKey_fenix8solar47mm.prg
            garmin-build/SentryKey_fenix8solar51mm.prg
            android-build/SentryKey.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


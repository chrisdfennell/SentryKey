name: SentryKey Build CI

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:   # lets you build the Play AAB on demand from the Actions tab

permissions:
  contents: write

jobs:
  build-garmin:
    name: Build Garmin Watch App
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/blackshadev/garmin-connectiq-tools:9.1.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Decode Developer Key
        run: |
          if [ -z "${{ secrets.GARMIN_DEVELOPER_KEY }}" ]; then
            echo "Error: GARMIN_DEVELOPER_KEY secret is not set!" >&2
            exit 1
          fi
          echo "${{ secrets.GARMIN_DEVELOPER_KEY }}" | base64 -d > developer_key.der

      - name: Compile Garmin App
        run: |
          mkdir -p bin
          
          echo "Compiling Garmin Store Package (.iq)..."
          java -jar /connectiq/bin/monkeybrains.jar \
            -e \
            -f monkey.jungle \
            -y developer_key.der \
            -o bin/SentryKey.iq
          
          echo "Compiling Garmin Watch Binaries (.prg)..."
          java -jar /connectiq/bin/monkeybrains.jar \
            -f monkey.jungle \
            -y developer_key.der \
            -o bin/SentryKey_fenix843mm.prg \
            -d fenix843mm
          
          java -jar /connectiq/bin/monkeybrains.jar \
            -f monkey.jungle \
            -y developer_key.der \
            -o bin/SentryKey_fenix847mm.prg \
            -d fenix847mm
          
          java -jar /connectiq/bin/monkeybrains.jar \
            -f monkey.jungle \
            -y developer_key.der \
            -o bin/SentryKey_fenix8solar47mm.prg \
            -d fenix8solar47mm
          
          java -jar /connectiq/bin/monkeybrains.jar \
            -f monkey.jungle \
            -y developer_key.der \
            -o bin/SentryKey_fenix8solar51mm.prg \
            -d fenix8solar51mm

      - name: Upload Garmin Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sentrykey-garmin-build
          path: bin/

  build-android:
    name: Build Android Companion App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Compute version
        run: |
          # versionCode = monotonic CI run number; versionName from the tag (vX.Y.Z) or a dev default.
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            echo "VERSION_NAME=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "VERSION_NAME=1.0.0-dev.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          fi
          echo "VERSION_CODE=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Build Android App
        run: |
          cd companion
          chmod +x gradlew
          # github (sideload) flavor: self-updates from GitHub Releases.
          ./gradlew assembleGithubDebug

      - name: Rename APK file
        run: |
          mv companion/app/build/outputs/apk/github/debug/app-github-debug.apk companion/app/build/outputs/apk/github/debug/com.fennell.sentrykey.apk

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: sentrykey-companion-apk
          path: companion/app/build/outputs/apk/github/debug/com.fennell.sentrykey.apk

  build-ios:
    name: Compile iOS Companion
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # The loose .swift sources can't be built alone — xcodebuild needs a
      # committed Xcode project. ConnectIQ.framework is a licensed Garmin binary
      # that is NOT committed, so CI must fetch it at build time (e.g. a download
      # step using a private URL secret) before the build step will link.
      # Until the project exists this job skips with a notice instead of failing.
      - name: Check for Xcode project
        id: check
        run: |
          if [ -d companion-ios/SentryKey.xcodeproj ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No companion-ios/SentryKey.xcodeproj yet — skipping iOS compile-check. Create it in Xcode to enable this job. Note: ConnectIQ.framework is gitignored (licensed); CI must fetch it before building."
          fi

      - name: Select latest Xcode
        if: steps.check.outputs.exists == 'true'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build (no code signing)
        if: steps.check.outputs.exists == 'true'
        run: |
          xcodebuild build \
            -project companion-ios/SentryKey.xcodeproj \
            -scheme SentryKey \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

  build-android-play:
    name: Build Play Release Bundle (AAB)
    runs-on: ubuntu-latest
    # Runs on version tags (release flow) or a manual "Run workflow" click.
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Compute version
        run: |
          # Play REQUIRES a higher versionCode on every upload; the CI run number guarantees that.
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            echo "VERSION_NAME=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "VERSION_NAME=1.0.0" >> "$GITHUB_ENV"
          fi
          echo "VERSION_CODE=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Decode upload keystore
        env:
          RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          if [ -z "$RELEASE_KEYSTORE" ]; then
            echo "::error::RELEASE_KEYSTORE secret is not set — add the upload-keystore secrets before building a Play bundle." >&2
            exit 1
          fi
          echo "$RELEASE_KEYSTORE" | base64 -d > "$RUNNER_TEMP/upload-keystore.jks"

      - name: Build signed Play AAB
        env:
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/upload-keystore.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          cd companion
          chmod +x gradlew
          ./gradlew bundlePlayRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentrykey-play-release-aab
          path: companion/app/build/outputs/bundle/playRelease/app-play-release.aab

  create-release:
    name: Publish GitHub Release
    needs: [build-garmin, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Garmin Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: sentrykey-garmin-build
          path: garmin-build/

      - name: Download Android Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: sentrykey-companion-apk
          path: android-build/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            garmin-build/SentryKey.iq
            garmin-build/SentryKey_fenix843mm.prg
            garmin-build/SentryKey_fenix847mm.prg
            garmin-build/SentryKey_fenix8solar47mm.prg
            garmin-build/SentryKey_fenix8solar51mm.prg
            android-build/com.fennell.sentrykey.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

